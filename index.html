<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker – Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="login-page min-h-screen flex items-center justify-center bg-gray-50">

  <div class="login-card w-full max-w-sm mx-4 bg-white rounded-2xl border border-gray-200 shadow-sm p-8">

    <div class="flex justify-center mb-5">
      <img src="assets/github-logo.png" class="w-12 h-12" alt="GitHub Logo" />
    </div>

    <h1 class="text-center text-2xl font-bold text-gray-900 mb-1">GitHub Issues Tracker</h1>
    <p class="text-center text-sm text-gray-500 mb-6">Sign in to manage your issues</p>

    <div id="error-msg" class="hidden alert alert-error text-sm py-2 px-3 mb-4 rounded-lg"></div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
        <input id="username" type="text" placeholder="Enter your username"
          class="w-full input input-bordered input-sm h-10 rounded-lg text-sm focus:outline-none focus:border-violet-500"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password"
          class="w-full input input-bordered input-sm h-10 rounded-lg text-sm focus:outline-none focus:border-violet-500"/>
      </div>
      <button id="signin-btn" onclick="handleLogin()"
        class="w-full btn btn-sm h-10 rounded-lg text-white font-semibold text-sm"
        style="background:#6e40c9; border:none;">
        Sign In
      </button>
    </div>

    <div class="mt-6 p-3 bg-gray-50 rounded-lg border border-gray-100">
      <p class="text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Demo Credentials</p>
      <p class="text-xs text-gray-600">Username: <span class="font-mono font-semibold text-gray-800">admin</span></p>
      <p class="text-xs text-gray-600">Password: <span class="font-mono font-semibold text-gray-800">admin123</span></p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
